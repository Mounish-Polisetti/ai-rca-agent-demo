global:
  resolve_timeout: 5m

route:
  receiver: "rca-fastapi"
  group_by: ["alertname", "demand_type"]
  group_wait: 15s        # wait 15s to batch alerts before first send
  group_interval: 5m     # wait 5m before sending updates for same group
  repeat_interval: 1h    # wait 1h before re-sending same firing alert

receivers:
  - name: "rca-fastapi"
    webhook_configs:
        # host.docker.internal = your laptop from inside the Docker container
        # FastAPI rca_service.py runs on your laptop port 8000
      - url: "http://host.docker.internal:8000/trigger-rca"
        send_resolved: false
        http_config:
          follow_redirects: true
